<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zyy Bio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .container {
      padding: 30px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255,0,85,0.3);
      animation: fade 1s ease;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid #ff0055;
      box-shadow: 0 0 20px #ff0055;
    }

    h1 {
      font-size: 20px;
    }

    .dev {
      font-size: 12px;
      color: #ff0055;
      margin-bottom: 10px;
    }

    .status {
      font-size: 12px;
      color: #00ff88;
      margin-bottom: 15px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {opacity: 0.3;}
    }

    p {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      margin: 10px 0;
      padding: 13px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .link:hover {
      background: #ff0055;
      transform: scale(1.08);
      box-shadow: 0 0 20px #ff0055;
    }

    footer {
      margin-top: 20px;
      font-size: 11px;
      color: #777;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://qu.ax/mmWZv">
  <h1>Zyy Kyomii 😎</h1>

  <div class="dev">Developer: lu sendiri 😹</div>
  <div class="status">● Online</div>

  <p>idc. idgaf. hidup santai 😹</p>

  <a href="https://t.me/zyyneweraa" class="link">Telegram</a>
  <a href="https://t.me/kaiineweraa" class="link">Ch Telegram</a>
  <a href="https://t.me/zyyneweraa_bot" class="link">Bot Telegram FlexCore</a>

  <footer>
    © 2026 Zyy — gausah iri 😹
  </footer>
</div>

<audio id="music" autoplay loop>
  <source src="all.mp3" type="audio/mpeg">
</audio>

<script>
  document.body.addEventListener('click', () => {
    document.getElementById('music').play();
  });
</script>

</body>
</html>
